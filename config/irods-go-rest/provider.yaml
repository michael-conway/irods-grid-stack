PublicURL: http://127.0.0.1:8080
ListenAddr: :8080
RestLogLevel: info

IrodsHost: irods-provider
IrodsPort: 1247
IrodsZone: tempZone
IrodsAdminUser: rods
IrodsAdminPassword: rods
IrodsAdminPasswordFile:
IrodsAdminLoginType: native
IrodsAuthScheme: native
IrodsNegotiationPolicy: CS_NEG_DONT_CARE
IrodsSSLConfig:
  CACertificateFile:
  CACertificatePath:
  EncryptionKeySize: 32
  EncryptionAlgorithm: AES-256-CBC
  EncryptionSaltSize: 8
  EncryptionNumHashRounds: 16
  VerifyServer: hostname
  DHParamsFile:
  ServerName:
IrodsDefaultResource: providerResc

S3ApiSupported: true
S3BucketMappingFile: /shared-s3/provider/irods-s3-bucket-mapping.json
S3UserMappingFile: /shared-s3/irods-s3-user-mapping.json

ReplicaTrimMinCopies: 1
ReplicaTrimMinAgeMinutes: 0
TestResource1: providerResc
TestResource2: resourceResc

OidcUrl: https://keycloak:8443
OidcClientId: irods-go-rest
OidcClientSecret: change-me
OidcClientSecretFile:
OidcInsecureSkipVerify: true
OidcRealm: drs
OidcScope: openid profile email

